name: esc_siantan_finance
description: Aplikasi mobile Tim Finance — ESC Siantan Finance
publish_to: "none"
version: 2.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.6   # backend (auth, postgrest, storage)
  provider: ^6.1.2           # state management
  sqflite: ^2.3.3            # penyimpanan lokal draft sesi
  path: ^1.9.0
  signature: ^5.5.0          # kanvas tanda tangan digital
  intl: ^0.19.0              # format tanggal & rupiah
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# Logo aplikasi (church + koin Rp). Generate dgn:
#   flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/esc_icon_full.png"
  adaptive_icon_background: "#1E40AF"
  adaptive_icon_foreground: "assets/icon/esc_icon_fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
