<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{width:1200px;height:640px;background:#eef2f7;font-family:'Segoe UI',Arial,sans-serif;color:#1f2937;display:flex;align-items:center;justify-content:center}
  .card{display:flex;width:860px;height:486px;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 12px 36px rgba(30,64,175,.16)}
  .left{width:372px;background:#1E40AF;color:#fff;padding:50px 40px;display:flex;flex-direction:column;justify-content:center}
  .left .logo{font-size:46px}
  .left h1{font-size:25px;font-weight:700;margin-top:16px;line-height:1.2}
  .left p{color:#bfdbfe;font-size:14px;margin-top:10px;line-height:1.6}
  .left .feat{margin-top:30px;font-size:13px;color:#dbeafe;line-height:2}
  .right{flex:1;padding:52px 44px;display:flex;flex-direction:column;justify-content:center}
  .right h2{font-size:21px;font-weight:700;color:#0f172a}
  .right .s{color:#6b7280;font-size:13px;margin:7px 0 26px}
  label{font-size:12px;color:#374151;font-weight:600}
  .inp{height:42px;border:1px solid #d1d5db;border-radius:9px;background:#f9fafb;color:#475569;font-size:13px;padding:0 14px;line-height:42px;margin:7px 0 16px}
  .btn{background:#1E40AF;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;padding:13px;text-align:center;margin-top:6px}
  .sec{text-align:center;color:#94a3b8;font-size:11px;margin-top:18px}
</style></head><body>
  <div class="card">
    <div class="left">
      <div class="logo">⛪</div>
      <h1>ESC Siantan Finance</h1>
      <p>Sistem Akuntansi &amp; Bendahara Gereja Terintegrasi</p>
      <div class="feat">✓ Rekonsiliasi kas otomatis<br>✓ Laporan keuangan standar<br>✓ Aman &amp; tercadangkan harian</div>
    </div>
    <div class="right">
      <h2>Masuk ke akun Anda</h2>
      <div class="s">Khusus pengurus &amp; bendahara gereja</div>
      <label>Email</label>
      <div class="inp">bendahara@gereja.id</div>
      <label>Kata sandi</label>
      <div class="inp">••••••••••</div>
      <div class="btn">Masuk</div>
      <div class="sec">🔒 Koneksi aman terenkripsi</div>
    </div>
  </div>
</body></html>
